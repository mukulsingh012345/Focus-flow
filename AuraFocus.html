// ─── Push Notification Helper ─────────────────────────────────────────────────
function sendNotification(title, body) {
  if (typeof window === "undefined") return;
  if (!("Notification" in window)) return;
  if (Notification.permission === "granted") {
    try { new Notification(title, { body }); } catch(e) {}
  }
}

// ─── Circular Progress ────────────────────────────────────────────────────────
function CircularProgress({ progress, size = 260, strokeWidth = 10, color, children }) {
  const r = (size - strokeWidth * 2) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ - (progress / 100) * circ;
  return (
    <div style={{ position:"relative", width:size, height:size }}>
      <svg width={size} height={size} style={{ transform:"rotate(-90deg)" }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={strokeWidth} />
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={strokeWidth}
          strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
          style={{ transition:"stroke-dashoffset 0.8s ease" }} />
      </svg>
      <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center" }}>
        {children}
      </div>
    </div>
  );
}

    return () => clearInterval(t);
  }, []);
  const color = isYou ? "#7c6aff" : ["#00d4ff","#ff6eb4","#ffd166","#06ffa5","#ff9b54"][Math.floor(Math.random()*5)];
  return (
    <div style={{ position:"absolute", left:`${x}%`, top:`${y}%`, transform:"translate(-50%,-50%)", textAlign:"center", zIndex:2 }}>
      <div style={{
        width:isYou?52:38, height:isYou?52:38, borderRadius:"50%",
        background:`radial-gradient(circle, ${color}cc, ${color}44)`,
        boxShadow:`0 0 ${pulse?24:14}px ${pulse?12:6}px ${color}66`,
        display:"flex", alignItems:"center", justifyContent:"center",

      </div>
      <div style={{ fontSize:10, color:"rgba(255,255,255,0.7)", marginTop:4, whiteSpace:"nowrap" }}>{name}</div>

  );
}

// ─── Toast ────────────────────────────────────────────────────────────────────
function Toast({ msg, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 3500); return () => clearTimeout(t); }, []);
  return (
    <div style={{
      position:"fixed", bottom:88, left:"50%", transform:"translateX(-50%)",
      background:"linear-gradient(135deg, #1c1d2e, #14152a)",
      border:"1px solid rgba(124,106,255,0.4)",
      color:"#fff", padding:"11px 18px", borderRadius:12, fontSize:12,
      fontWeight:600, zIndex:999, boxShadow:"0 4px 24px rgba(0,0,0,0.5)",
      whiteSpace:"nowrap", animation:"slideUp 0.3s ease", maxWidth:"90vw",
    }}>{msg}</div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function AuraFocus() {
  const [tab, setTab] = useState("timer");
  const [username] = useState("GoTuber");

  // Timer
  const [settings, setSettings]         = useState({ work:25, short:5, long:15 });
  const [editSettings, setEditSettings] = useState({ work:25, short:5, long:15 });
  const [mode, setMode]                 = useState("work");
  const [timeLeft, setTimeLeft]         = useState(25 * 60);
  const [running, setRunning]           = useState(false);
  const [sessions, setSessions]         = useState(0);
  const [totalMins, setTotalMins]       = useState(0);
  const intervalRef = useRef(null);

  // Streak & badges
  const [streak, setStreak]               = useState(2);
  const [lastFocusDay, setLastFocusDay]   = useState(null);
  const [earnedBadges, setEarnedBadges]   = useState(new Set());
  const [newBadges, setNewBadges]         = useState(new Set());

  // Notifications
  const [notifPermission, setNotifPermission] = useState("default");
  const [notifEnabled, setNotifEnabled]       = useState(true);
  const [toasts, setToasts]                   = useState([]);

  // Alibi
  const [alibiInput, setAlibiInput] = useState("");
  const [alibis, setAlibis]         = useState(["In deep focus mode, back in a bit! ⚡","Heads down — will reply after my session 🎯"]);
  const [copiedIdx, setCopiedIdx]   = useState(null);

  // Pact
  const [pactFriend, setPactFriend]   = useState("");
  const [linkedFriend, setLinkedFriend] = useState(null);

  // Vibe
  const [vibes, setVibes]               = useState([]);
  const [selectedMood, setSelectedMood] = useState(null);
  const [showVibePrompt, setShowVibePrompt] = useState(false);

  const focusers = [
    { name:"Alex", x:20, y:25 },{ name:"Sam", x:72, y:18 },
    { name:"Jordan", x:58, y:68 },{ name:"Riley", x:30, y:72 },
  ];

  // ── Notification permission ──
  useEffect(() => {
    if ("Notification" in window) setNotifPermission(Notification.permission);
  }, []);

  const requestNotifPermission = async () => {
    if (!("Notification" in window)) { addToast("❌ Browser doesn't support notifications"); return; }
    const perm = await Notification.requestPermission();
    setNotifPermission(perm);
    if (perm === "granted") addToast("🔔 Notifications enabled!");
    else addToast("❌ Notifications denied");
  };

  const addToast = (msg) => {
    const id = Date.now() + Math.random();
    setToasts(t => [...t.slice(-2), { id, msg }]);
  };

  const notify = useCallback((title, body) => {
    if (!notifEnabled) return;
    sendNotification(title, body);
    addToast(`${title}`);
  }, [notifEnabled]);

  // ── Badge checker ──
  const checkBadges = useCallback((s, str, mins) => {
    const hour = new Date().getHours();
    const newly = new Set();
    ALL_BADGES.forEach(b => {
      if (!earnedBadges.has(b.id) && b.check(s, str, hour, mins)) newly.add(b.id);
    });
    if (newly.size > 0) {
      setEarnedBadges(prev => new Set([...prev, ...newly]));
      setNewBadges(newly);
      newly.forEach(id => {
        const b = ALL_BADGES.find(x => x.id === id);
        if (b) notify(`${b.icon} Badge Unlocked!`, `You earned "${b.name}"`);
      });
      setTimeout(() => setNewBadges(new Set()), 8000);
    }
  }, [earnedBadges, notify]);

  // ── Timer helpers ──
  const totalSeconds  = mode === "work" ? settings.work*60 : mode === "short" ? settings.short*60 : settings.long*60;
  const progress      = ((totalSeconds - timeLeft) / totalSeconds) * 100;
  const modeColor     = mode === "work" ? "#7c6aff" : mode === "short" ? "#06ffa5" : "#00d4ff";
  const modeLabel     = mode === "work" ? "Focus" : mode === "short" ? "Short Break" : "Long Break";
  const formatTime    = (s) => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;

  const resetTimer = (m = mode, s = settings) => {
    clearInterval(intervalRef.current);
    setRunning(false);
    setTimeLeft((m==="work" ? s.work : m==="short" ? s.short : s.long) * 60);
  };

  const switchMode = (m) => {
    setMode(m); clearInterval(intervalRef.current); setRunning(false);
    setTimeLeft((m==="work" ? settings.work : m==="short" ? settings.short : settings.long) * 60);
  };

  const handleStartStop = () => {
    if (!running) notify("▶ Focus Started 🎯", `${modeLabel} — stay locked in!`);
    setRunning(r => !r);
  };

  // ── Tick ──
  useEffect(() => {
    if (running) {
      intervalRef.current = setInterval(() => {
        setTimeLeft(t => {
          // Halfway nudge
          if (t === Math.floor(totalSeconds / 2) && mode === "work") {
            notify("⏱ Halfway There!", "Keep pushing — you got this!");
          }
          if (t <= 1) {
            clearInterval(intervalRef.current);
            setRunning(false);
            if (mode === "work") {
              setSessions(prev => {
                const newS = prev + 1;
                setTotalMins(m => {
                  const newM = m + settings.work;
                  setStreak(str => {
                    const today = new Date().toDateString();
                    const newStr = lastFocusDay !== today ? str + 1 : str;
                    if (lastFocusDay !== today) setLastFocusDay(today);
                    checkBadges(newS, newStr, newM);
                    return newStr;
                  });
                  return newM;
                });
                return newS;
              });
              notify("🎉 Session Complete!", "Time for a well-earned break!");
              setShowVibePrompt(true);
            } else {
              notify("⏰ Break Over!", "Back to focus mode 🚀");
            }
            return 0;
          }
          return t - 1;
        });
      }, 1000);
    } else {
      clearInterval(intervalRef.current);
    }
    return () => clearInterval(intervalRef.current);
  }, [running, mode]);

  // ── Styles ──

        radial-gradient(ellipse 50% 35% at 80% 100%, rgba(0,212,255,0.08) 0%, transparent 60%)
      `,
    },
    header: {
      display:"flex", alignItems:"center", justifyContent:"space-between",
      padding:"14px 18px 10px", borderBottom:"1px solid rgba(255,255,255,0.07)",
      background:"rgba(10,11,16,0.92)", backdropFilter:"blur(12px)",
      position:"sticky", top:0, zIndex:10,
    },
    tabBar: {
      display:"flex", overflowX:"auto", padding:"0 8px",
      borderBottom:"1px solid rgba(255,255,255,0.07)",
      background:"rgba(10,11,16,0.95)", backdropFilter:"blur(12px)",
      position:"sticky", top:61, zIndex:9, scrollbarWidth:"none",
    },
    tab: (a) => ({
      display:"flex", alignItems:"center", gap:4, padding:"10px 11px",
      fontSize:11, fontWeight:600, whiteSpace:"nowrap", cursor:"pointer",
      border:"none", background:"none",
      color: a ? "#00d4ff" : "rgba(255,255,255,0.38)",
      borderBottom: a ? "2px solid #00d4ff" : "2px solid transparent",
      transition:"all 0.2s", flexShrink:0,
    }),
    content: { flex:1, padding:"16px 14px 100px", overflowY:"auto" },
    card: {
      background:"rgba(255,255,255,0.04)", borderRadius:16,
      border:"1px solid rgba(255,255,255,0.08)", padding:"16px", marginBottom:12,
    },
    cardTitle: { fontSize:17, fontWeight:700, marginBottom:5, display:"flex", alignItems:"center", gap:8 },
    cardSub: { fontSize:12, color:"rgba(255,255,255,0.45)", lineHeight:1.55 },
    btn: (bg, col="#fff") => ({
      width:"100%", padding:"13px", borderRadius:12, border:"none",
      background:bg, color:col, fontSize:14, fontWeight:700, cursor:"pointer",
      display:"flex", alignItems:"center", justifyContent:"center", gap:8,
    }),
    input: {
      width:"100%", padding:"11px 13px", borderRadius:10,
      border:"1px solid rgba(255,255,255,0.1)", background:"rgba(255,255,255,0.05)",
      color:"#e8e9f0", fontSize:13, outline:"none", boxSizing:"border-box",
    },

  const tabs = [

            borderRadius:8, padding:"6px 8px", cursor:"pointer",
            color: notifEnabled && notifPermission==="granted" ? "#00d4ff" : "rgba(255,255,255,0.3)",

            <BellIcon off={!notifEnabled || notifPermission !== "granted"} />
          </button>
          <button style={{ background:"none", border:"none", color:"rgba(255,255,255,0.3)", cursor:"pointer" }}>
            <LogoutIcon />
          </button>
        </div>
      </div>

      <div style={S.tabBar}>
        {tabs.map(t => (
          <button key={t.id} style={S.tab(tab === t.id)} onClick={() => setTab(t.id)}>

              <span style={{ background:"#ffd166", color:"#0a0b10", borderRadius:"50%", width:14, height:14, fontSize:8, fontWeight:800, display:"inline-flex", alignItems:"center", justifyContent:"center", marginLeft:2 }}>

              <button onClick={() => resetTimer(mode, settings)} style={{ flex:1, padding:"13px", borderRadius:12, border:"1px solid rgba(255,255,255,0.1)", background:"rgba(255,255,255,0.04)", color:"rgba(255,255,255,0.55)", fontSize:14, fontWeight:700, cursor:"pointer" }}>↺</button>

            {/* Stats row */}
            <div style={{ ...S.card, display:"flex", justifyContent:"space-around", padding:"13px 0" }}>

                    setShowVibePrompt(false);

                    {selectedMood ? "Share Vibe ✨" : "Skip"}

                </div>
              </div>

          </>

        {/* ─── ORBIT ─── */}
        {tab === "orbit" && (
          <>
            <div style={S.card}>

              </div>
            </div>
          </>
        )}

        {tab === "badges" && (

                  </div>
                  <div style={{ fontSize:12, color:"rgba(255,255,255,0.45)", marginTop:3 }}>Badges Unlocked</div>

                </div>
              </div>
              <div style={{ height:6, borderRadius:3, background:"rgba(255,255,255,0.08)" }}>

            <button onClick={() => {

                  checkBadges(newS, streak, newM);
                  return newM;
                });
                return newS;
              });
              addToast("✅ Simulated a session!");
            }} style={{ ...S.btn("rgba(255,255,255,0.05)"), border:"1px dashed rgba(255,255,255,0.14)", color:"rgba(255,255,255,0.4)", marginBottom:12, fontSize:12 }}>
              ＋ Simulate Session (testing)
            </button>

            {/* All badges */}
            <div style={S.card}>
              <div style={{ fontSize:13, fontWeight:700, marginBottom:12, color:"#ffd166" }}>🏅 All Badges</div>

                <BadgeCard key={b.id} badge={b} earned={earnedBadges.has(b.id)} newlyEarned={newBadges.has(b.id)} />
              ))}
            </div>
          </>
        )}

        {tab === "alibi" && (
          <>

                <button onClick={() => { if(alibiInput.trim()){ setAlibis(a=>[alibiInput.trim(),...a]); setAlibiInput(""); }}}

                  <PlusIcon />
                </button>
              </div>
            </div>
            <div style={S.card}>
              <div style={{ fontSize:13, fontWeight:700, marginBottom:9 }}>Your Messages</div>
              {alibis.length === 0

                  <div key={i} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"10px 12px", borderRadius:10, marginBottom:8, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.07)" }}>
                    <div style={{ fontSize:12, flex:1, marginRight:8, color:"rgba(255,255,255,0.75)" }}>{a}</div>
                    <div style={{ display:"flex", gap:6 }}>
                      <button onClick={() => { navigator.clipboard?.writeText(a); setCopiedIdx(i); setTimeout(()=>setCopiedIdx(null),1500); }}
                        style={{ background:"rgba(0,212,255,0.1)", border:"none", color:"#00d4ff", borderRadius:7, padding:"5px 8px", cursor:"pointer" }}>
                        {copiedIdx===i ? "✓" : <CopyIcon />}

                      <button onClick={() => setAlibis(al => al.filter((_,j)=>j!==i))}

                        <TrashIcon />
                      </button>
                    </div>
                  </div>
                ))
              }
            </div>
            <button style={S.btn("linear-gradient(135deg,#b06aff,#ff6eb4)")}>💾 Save Messages</button>
          </>
        )}

        {/* ─── PACT ─── */}
        {tab === "pact" && (
          <>
            <div style={S.card}>
              <div style={S.cardTitle}>🤝 Accountability Pact</div>
              <p style={S.cardSub}>Link a friend who gets notified if you break your session early.</p>

              <div style={{ ...S.card, border:"1px solid rgba(6,255,165,0.28)", background:"rgba(6,255,165,0.05)" }}>

                <div style={{ fontSize:13, color:"rgba(255,255,255,0.7)" }}>Linked with <strong>@{linkedFriend}</strong></div>

              </div>
            ) : (
              <div style={S.card}>
                <div style={{ fontSize:13, fontWeight:700, marginBottom:9 }}>Link a Friend</div>
                <input style={{ ...S.input, marginBottom:10 }} placeholder="Enter friend's username"
                  value={pactFriend} onChange={e => setPactFriend(e.target.value)} />
                <button onClick={() => { if(pactFriend.trim()){ setLinkedFriend(pactFriend.trim()); setPactFriend(""); }}}
                  style={S.btn("linear-gradient(135deg,#ff9b54,#ff6b35)")}>
                  🔗 Link Pact
                </button>
              </div>
            )}
            <div style={{ ...S.card, border:"1px solid rgba(255,209,102,0.18)" }}>
              <div style={{ fontSize:12, fontWeight:700, color:"#ffd166", marginBottom:5 }}>⚠️ How it works</div>
              <div style={{ fontSize:12, color:"rgba(255,255,255,0.38)", lineHeight:1.6 }}>When you break a focus session early, your accountability friend gets a notification. This keeps you committed to your goals!</div>
            </div>
          </>
        )}

        {/* ─── VIBE ─── */}
        {tab === "vibe" && (
          <>
            <div style={S.card}>
              <div style={S.cardTitle}>😊 Vibe-Check Feed</div>
              <p style={S.cardSub}>Post-session moods from the AuraFocus community.</p>

            {vibes.length === 0
              ? <div style={{ ...S.card, textAlign:"center", padding:"36px 20px" }}>
                  <div style={{ fontSize:36, marginBottom:10 }}>✨</div>
                  <div style={{ fontSize:14, fontWeight:700, marginBottom:5 }}>No vibes yet</div>
                  <div style={{ fontSize:12, color:"rgba(255,255,255,0.38)" }}>Complete a session and share your mood!</div>
                </div>
              : vibes.map((v,i) => {
                  const mood = MOODS.find(m => m.label===v.mood) || MOODS[0];
                  return (
                    <div key={i} style={{ ...S.card, borderLeft:`3px solid ${mood.color}` }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                        <div style={{ fontSize:14, fontWeight:700 }}>{v.mood}</div>
                        <div style={{ fontSize:11, color:"rgba(255,255,255,0.32)" }}>{v.time}</div>
                      </div>
                      <div style={{ fontSize:12, color:"rgba(255,255,255,0.38)", marginTop:3 }}>@{v.user}</div>
                    </div>
                  );
                })

          </>
        )}

        {/* ─── SETTINGS ─── */}
        {tab === "settings" && (
          <>
            <div style={S.card}>

              <p style={S.cardSub}>Customize your timer and notifications.</p>
            </div>

            <div style={S.card}>
              <div style={{ fontSize:13, fontWeight:700, marginBottom:12, color:"#00d4ff" }}>🔔 Notifications</div>

                <div key={label} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:11 }}>
                  <div style={{ fontSize:13, color:"rgba(255,255,255,0.65)" }}>{label}</div>
                  <div onClick={() => {
                    if (notifPermission !== "granted") requestNotifPermission();
                    else setNotifEnabled(e => !e);

                    width:40, height:22, borderRadius:11, cursor:"pointer",

                    position:"relative", transition:"background 0.2s", flexShrink:0,
                  }}>
                    <div style={{
                      position:"absolute", top:2,
                      left: notifEnabled && notifPermission==="granted" ? 19 : 2,
                      width:18, height:18, borderRadius:"50%", background:"#fff", transition:"left 0.2s",
                    }} />
                  </div>
                </div>
              ))}
              {notifPermission !== "granted" && (
                <button onClick={requestNotifPermission} style={{ ...S.btn("rgba(0,212,255,0.1)"), color:"#00d4ff", border:"1px solid rgba(0,212,255,0.25)", marginTop:6, fontSize:12 }}>
                  <BellIcon /> Enable Browser Notifications
                </button>
              )}
            </div>

            {/* Timer durations */}
            <div style={S.card}>
              <div style={{ fontSize:13, fontWeight:700, marginBottom:13, color:"#7c6aff" }}>🕐 Timer Durations</div>
              {[["work","Work Duration","#7c6aff",5,120],["short","Short Break","#06ffa5",1,30],["long","Long Break","#00d4ff",5,60]].map(([k,l,c,min,max]) => (

                    <span style={{ fontSize:12, color:"rgba(255,255,255,0.5)", fontWeight:600 }}>{l}</span>
                    <span style={{ fontSize:19, fontWeight:800, color:c }}>{editSettings[k]}<span style={{ fontSize:11, color:"rgba(255,255,255,0.3)", fontWeight:500 }}> min</span></span>

            </button>
          </>
        )}

      </div>
